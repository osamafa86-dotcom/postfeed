<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غير متصل - نيوزفلو</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1a5c5c 100%);
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    text-align: center;
    max-width: 420px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 36px 28px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }
  .icon { font-size: 56px; margin-bottom: 16px; }
  h1 { font-size: 22px; margin: 0 0 12px; font-weight: 800; }
  p  { font-size: 15px; line-height: 1.7; opacity: 0.85; margin: 0 0 22px; }
  button {
    background: #1a5c5c;
    color: #fff;
    border: 0;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #166060; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>لا يمكن الوصول إلى نيوزفلو حالياً. تحقق من اتصالك ثم حاول مجدداً.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
