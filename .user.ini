; Force PHP to re-check file timestamps every request so newly-deployed
; files take effect immediately without waiting for the opcache TTL.
; On GoDaddy shared hosting, opcache_reset() in deploy.php does not
; always propagate across FPM worker pools, which causes stale bytecode
; to keep serving after a successful git pull. These settings are the
; reliable fix on that platform.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
