name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'
          cache: true

      - name: Flutter doctor
        working-directory: app
        run: flutter doctor -v

      - name: Fill in missing Android platform files
        working-directory: app
        run: flutter create --platforms=android --org=net.feedsnews --project-name=feedsnews .

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build debug APK
        working-directory: app
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE=https://feedsnews.net/api/v1

      - name: Build release APK (unsigned)
        working-directory: app
        run: |
          flutter build apk --release \
            --obfuscate --split-debug-info=build/debug-info \
            --dart-define=API_BASE=https://feedsnews.net/api/v1

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: feedsnews-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: feedsnews-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build release AAB (Play Store)
        working-directory: app
        run: |
          flutter build appbundle --release \
            --obfuscate --split-debug-info=build/debug-info \
            --dart-define=API_BASE=https://feedsnews.net/api/v1

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: feedsnews-release-aab
          path: app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
