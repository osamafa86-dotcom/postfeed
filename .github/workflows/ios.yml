name: Build iOS IPA

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep -i xcode

      - name: Use latest stable Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'
          cache: true

      - name: Flutter doctor
        working-directory: app
        run: flutter doctor -v

      - name: Fill in missing iOS platform files
        working-directory: app
        run: flutter create --platforms=ios --org=net.feedsnews --project-name=feedsnews .

      - name: Force iOS 14 deployment target in Podfile
        working-directory: app/ios
        run: |
          python3 - <<'PY'
          import re
          with open('Podfile') as f: c = f.read()
          # Strip any existing platform :ios line (commented or not).
          c = re.sub(r'^#?\s*platform\s+:ios.*\n', '', c, flags=re.MULTILINE)
          # Pin to iOS 14 — firebase_core 11.x requires >= 13, sentry needs >= 12.
          c = "platform :ios, '14.0'\n" + c.lstrip()
          with open('Podfile', 'w') as f: f.write(c)
          PY
          head -5 Podfile

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Pod install
        working-directory: app/ios
        run: |
          pod install --repo-update

      - name: Build IPA (no codesign — for verification only)
        working-directory: app
        run: |
          flutter build ios --release --no-codesign \
            --obfuscate --split-debug-info=build/debug-info \
            --dart-define=API_BASE=https://feedsnews.net/api/v1

      - name: Package unsigned IPA
        working-directory: app
        run: |
          mkdir -p build/ios/ipa-unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa-unsigned/Payload/
          cd build/ios/ipa-unsigned
          zip -qr ../feedsnews-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: feedsnews-unsigned-ipa
          path: app/build/ios/feedsnews-unsigned.ipa
          retention-days: 30

      # The signed/TestFlight upload below activates ONLY when
      # secrets are configured. Otherwise this step is skipped.
      - name: Check for signing secrets
        id: check-secrets
        run: |
          if [ -n "${{ secrets.IOS_CERTIFICATE_BASE64 }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Import signing certificate
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import $RUNNER_TEMP/cert.p12 \
            -k build.keychain -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Install provisioning profile
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/feedsnews.mobileprovision

      - name: Build signed IPA
        if: steps.check-secrets.outputs.has_secrets == 'true'
        working-directory: app
        run: |
          flutter build ipa --release \
            --obfuscate --split-debug-info=build/debug-info \
            --dart-define=API_BASE=https://feedsnews.net/api/v1 \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload signed IPA
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: feedsnews-signed-ipa
          path: app/build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > \
            ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$(ls app/build/ios/ipa/*.ipa | head -1)" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
