# XcodeGen project spec for the NewsFeed iOS app.
#
# To generate NewsFeed.xcodeproj run (one-time):
#   brew install xcodegen
#   cd ios && xcodegen generate
#
# This project targets iOS 16.0+ and uses SwiftUI + async/await.

name: NewsFeed
options:
  bundleIdPrefix: net.feedsnews
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: ar
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: "" # <-- set your Apple Developer Team ID

targets:
  NewsFeed:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NewsFeed
        excludes:
          - "**/.DS_Store"
    resources:
      - path: NewsFeed/Assets.xcassets
      - path: NewsFeed/ar.lproj
      - path: NewsFeed/en.lproj
      - path: NewsFeed/LaunchScreen.storyboard
      - path: NewsFeed/PrivacyInfo.xcprivacy
    info:
      path: NewsFeed/Info.plist
      properties:
        CFBundleDisplayName: "نيوز فيد"
        CFBundleName: NewsFeed
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: ar
        CFBundleLocalizations:
          - ar
          - en
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts: []
        UIBackgroundModes:
          - remote-notification
        UIUserInterfaceStyle: Automatic
        UIViewControllerBasedStatusBarAppearance: true
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains: {}
        NSUserTrackingUsageDescription: >-
          نستخدم هذه المعلومة لتخصيص الأخبار المقترحة لك ولتحسين تجربتك.
        NSPhotoLibraryAddUsageDescription: >-
          يطلب التطبيق الإذن لحفظ الصور المشاركة على مكتبة الصور.
        LSApplicationQueriesSchemes:
          - mailto
          - tel
          - twitter
          - telegram
        CFBundleURLTypes:
          - CFBundleURLName: net.feedsnews.newsfeed
            CFBundleURLSchemes:
              - newsfeed
    entitlements:
      path: NewsFeed/NewsFeed.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.feedsnews.newsfeed
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
